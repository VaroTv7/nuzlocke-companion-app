version: '3.8'

services:
  # Frontend - React App (Builds from source)
  varo-pokemon-frontend:
    container_name: varo-pokemon-frontend
    build:
      context: ./nuzlocke-app
      dockerfile: Dockerfile
    image: varopokemon-companiotool:v3.0
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      - varo-pokemon-api

  # Backend - Node.js API
  varo-pokemon-api:
    container_name: varo-pokemon-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: varopokemon-api:v2.0
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - ./saves:/app/saves
    environment:
      - NODE_ENV=production
      - PORT=8086
      - SAVES_DIR=/app/saves
